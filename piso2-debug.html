<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALM809P — N2 Debug Viewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0} body{background:#0a0a0a;color:#eee;font-family:Helvetica Neue,sans-serif;display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;background:#111;border-right:1px solid #1e1e1e;padding:12px;display:flex;flex-direction:column;gap:8px} #viewer{flex:1;position:relative}
button{padding:8px 10px;background:#1a1a1a;border:1px solid #333;color:#ddd;border-radius:6px;cursor:pointer;text-align:left} button:hover{background:#222}
#log{font:11px ui-monospace,monospace;color:#9ca3af;white-space:pre-wrap;overflow:auto;border-top:1px solid #222;padding-top:8px;max-height:45vh}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.72);font-size:14px} #status{position:absolute;left:12px;bottom:12px;background:rgba(0,0,0,.6);padding:6px 8px;border-radius:6px;font-size:12px}
</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"}}</script>
</head>
<body>
<div id="sidebar">
  <strong>N2 Debug</strong>
  <button data-id="S21" data-folder="S21_N2_D202_P1">S21 · D202 P1</button>
  <button data-id="S22" data-folder="S22_N2_D201_P2">S22 · D201 P2</button>
  <button data-id="S23" data-folder="S23_N2_D202">S23 · D202</button>
  <button id="all">Todos</button>
  <div id="log">booting...</div>
</div>
<div id="viewer"><div id="loading">Cargando debug viewer…</div><div id="status">sin texturas · material sólido · auto-center agresivo</div></div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
const BASE='https://media.githubusercontent.com/media/zxy-vc/baw-viewer/main/scans';
const ALIGN={S21:{dx:0,dy:0,dz:0,rotY:0,isRef:true},S22:{dx:-1.3,dy:0.57,dz:4.55,rotY:-90,isRef:false},S23:{dx:13.35,dy:2.44,dz:4.55,rotY:90,isRef:false}};
const SCANS=[{id:'S21',folder:'S21_N2_D202_P1'},{id:'S22',folder:'S22_N2_D201_P2'},{id:'S23',folder:'S23_N2_D202'}];
const log=(...a)=>{const el=document.getElementById('log');el.textContent += '\n'+a.join(' '); el.scrollTop=el.scrollHeight; console.log(...a)};
const viewer=document.getElementById('viewer');
const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setSize(viewer.clientWidth,viewer.clientHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); viewer.appendChild(renderer.domElement);
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0a0a0a);
const camera=new THREE.PerspectiveCamera(60,viewer.clientWidth/viewer.clientHeight,.01,5000); camera.position.set(8,6,16);
const controls=new OrbitControls(camera,renderer.domElement); controls.enableDamping=true;
scene.add(new THREE.AmbientLight(0xffffff,1.6)); const dl=new THREE.DirectionalLight(0xffffff,1.2); dl.position.set(10,20,10); scene.add(dl); scene.add(new THREE.GridHelper(80,40,0x333333,0x1a1a1a));
const loaded={};
function fit(obj){ const box=new THREE.Box3().setFromObject(obj); const size=box.getSize(new THREE.Vector3()); const center=box.getCenter(new THREE.Vector3()); const maxDim=Math.max(size.x,size.y,size.z)||10; const dist=maxDim*1.8; camera.position.set(center.x+dist*.8, center.y+dist*.6, center.z+dist); controls.target.copy(center); controls.update(); log('fit center=',center.x.toFixed(2),center.y.toFixed(2),center.z.toFixed(2),'size=',size.x.toFixed(2),size.y.toFixed(2),size.z.toFixed(2)); }
function applyAlignment(obj,id){ const a=ALIGN[id]; const box=new THREE.Box3().setFromObject(obj); obj.position.y=-box.min.y+a.dy; if(a.isRef){ obj.position.x=-((box.min.x+box.max.x)/2); obj.position.z=-((box.min.z+box.max.z)/2);} else { obj.rotation.y=a.rotY*Math.PI/180; obj.position.x=a.dx; obj.position.z=a.dz; } }
function clear(){ Object.values(loaded).forEach(o=>{ if(o.parent) scene.remove(o); }); }
function loadOne(id,folder){ return new Promise((resolve)=>{ if(loaded[id]) return resolve(loaded[id]); const url=`${BASE}/${folder}/ReprocessedMesh.obj`; log('loading',id,url); new OBJLoader().load(url,obj=>{ obj.traverse(c=>{ if(c.isMesh){ c.material=new THREE.MeshNormalMaterial({side:THREE.DoubleSide}); }}); applyAlignment(obj,id); loaded[id]=obj; resolve(obj); },undefined,err=>{ log('ERR',id, err?.message||err); resolve(null); }); }); }
async function showOne(id,folder){ clear(); document.getElementById('loading').style.display='flex'; const o=await loadOne(id,folder); if(o){ scene.add(o); fit(o); log('loaded',id); } else log('failed',id); document.getElementById('loading').style.display='none'; }
async function showAll(){ clear(); document.getElementById('loading').style.display='flex'; for(const s of SCANS){ const o=await loadOne(s.id,s.folder); if(o) scene.add(o); } fit(scene); log('loaded all'); document.getElementById('loading').style.display='none'; }
document.querySelectorAll('button[data-id]').forEach(b=>b.onclick=()=>showOne(b.dataset.id,b.dataset.folder)); document.getElementById('all').onclick=showAll;
window.addEventListener('resize',()=>{ camera.aspect=viewer.clientWidth/viewer.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(viewer.clientWidth,viewer.clientHeight); });
showOne('S21','S21_N2_D202_P1');
(function anim(){ requestAnimationFrame(anim); controls.update(); renderer.render(scene,camera); })();
</script>
</body>
</html>
